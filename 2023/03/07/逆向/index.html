  例如：strcmp(str1,str2)</span><br><span class="line">  strncmp:比较s1和s2字符串的前n个字符</span><br><span class="line">  例如：strncmp(str1,str2，size)</span><br><span class="line">  memset:对数组进行初始化</span><br><span class="line">  例如：memset(str2,0,sizeof(str2))//str2初始化</span><br><span class="line">  sprintf:格式化并打印各种数据到buffer数组</span><br><span class="line">  例如：sprintf( buffer,    &quot;String:%s\n&quot;, haha )</span><br><span class="line">       buffer数组内容：String:haha</span><br><span class="line">  read():读取内存中的数据</span><br><span class="line">  例如：read(0,a1,1);//从a1中读取1个字节的内容</span><br><span class="line">3.__readfsqword(0x28u)：用于alarm函数,防止调试</span><br><span class="line">4.foke()函数：pid_t m;</span><br><span class="line">             m = foke();</span><br><span class="line">             在代码执行完此句后会有两个几乎一致的进程</span><br><span class="line">5.python中截取一个二进制的低八位</span><br><span class="line">  cs=0B1010101010100101 </span><br><span class="line">  cs=int(bin(cs)[-8:], 2) </span><br><span class="line">6.__readfsqword(0x28u)防调试</span><br><span class="line">7.malloc分配的内存大小，并且返回一个指针</span><br></pre></td></tr></table></figure>
