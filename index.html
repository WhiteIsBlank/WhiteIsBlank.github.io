        <h2 id="逆向"><a href="#逆向" class="headerlink" title="逆向"></a>逆向</h2><figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br></pre></td><td class="code"><pre><span class="line">1.LOWORD：取得某个4字节变量(即32位的值)在内存中处于高位的两个字节,即一个word长的数据</span><br><span class="line">  HIWORD：取得某个4字节变量(即32位的值)在内存中处于低位的两个字节,即一个word长的数据</span><br><span class="line">  例如：0xCCDDEEFF</span><br><span class="line">	   HIWORD(0xCCDDEEFF)=oxCCDD</span><br><span class="line">	   LOWORD(0XCCDDEEFF)=0xEEFF</span><br><span class="line">2.strcpy:字符串复制函数</span><br><span class="line">  例如：strcpy(v5，&quot;123&quot;)</span><br><span class="line">  strcat:横向连接字符串</span><br><span class="line">  例如：combinedStr(数组)= strcat(s1, s2, ..., sN)</span><br><span class="line">       strcat(szKey, szPart1); </span><br><span class="line">  	   strcat(szKey, szPart2);</span><br><span class="line">  	   等同于szKey=strcat(szPart1,szPart2)</span><br><span class="line">  strcmp:对比两个字符串是否相等</span><br><span class="line">  例如：strcmp(str1,str2)</span><br><span class="line">  strncmp:比较s1和s2字符串的前n个字符</span><br><span class="line">  例如：strncmp(str1,str2，size)</span><br><span class="line">  memset:对数组进行初始化</span><br><span class="line">  例如：memset(str2,0,sizeof(str2))//str2初始化</span><br><span class="line">  sprintf:格式化并打印各种数据到buffer数组</span><br><span class="line">  例如：sprintf( buffer,    &quot;String:%s\n&quot;, haha )</span><br><span class="line">       buffer数组内容：String:haha</span><br><span class="line">  read():读取内存中的数据</span><br><span class="line">  例如：read(0,a1,1);//从a1中读取1个字节的内容</span><br><span class="line">3.__readfsqword(0x28u)：用于alarm函数,防止调试</span><br><span class="line">4.foke()函数：pid_t m;</span><br><span class="line">             m = foke();</span><br><span class="line">             在代码执行完此句后会有两个几乎一致的进程</span><br><span class="line">5.python中截取一个二进制的低八位</span><br><span class="line">  cs=0B1010101010100101 </span><br><span class="line">  cs=int(bin(cs)[-8:], 2) </span><br><span class="line">6.__readfsqword(0x28u)防调试</span><br><span class="line">7.malloc分配的内存大小，并且返回一个指针</span><br></pre></td></tr></table></figure>
